name: Test
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run application locally
        run: |
          npm start & 

      - name: Run Playwright tests
        run: npx playwright test
